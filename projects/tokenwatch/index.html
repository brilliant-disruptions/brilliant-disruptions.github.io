<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TokenWatch — Brilliant Disruptions</title>
  <meta name="description" content="Financial intelligence, reimagined. Watch the signal through the noise." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --void: #000008;
      --cyan: #00e5ff;
      --violet: #7c3aed;
      --magenta: #ff006e;
      --white: #f0f0ff;
      --muted: #3a3a5c;
      --glass: rgba(255,255,255,0.04);
      --glass-border: rgba(255,255,255,0.08);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--void);
      color: var(--white);
      font-family: 'Inter', system-ui, sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Background gradient orbs */
    .bg-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      pointer-events: none;
    }
    .bg-orb-1 { width: 600px; height: 600px; background: rgba(0,229,255,0.12); top: -100px; right: -100px; animation: drift1 20s ease-in-out infinite alternate; }
    .bg-orb-2 { width: 500px; height: 500px; background: rgba(124,58,237,0.12); bottom: -100px; left: -100px; animation: drift2 25s ease-in-out infinite alternate; }

    @keyframes drift1 { from { transform: translate(0,0); } to { transform: translate(-60px, 40px); } }
    @keyframes drift2 { from { transform: translate(0,0); } to { transform: translate(40px, -60px); } }

    /* Grid bg */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 560px;
      padding: 0 24px;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-decoration: none;
      margin-bottom: 48px;
      transition: color 0.2s ease;
    }
    .back-link:hover { color: var(--cyan); }
    .back-link svg { transition: transform 0.2s ease; }
    .back-link:hover svg { transform: translateX(-3px); }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--glass-border);
      background: var(--glass);
      backdrop-filter: blur(10px);
      padding: 8px 14px;
      border-radius: 999px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.15em;
      color: var(--cyan);
      margin-bottom: 32px;
    }
    .badge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 6px var(--cyan);
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

    .icon-wrap {
      margin-bottom: 24px;
      color: var(--cyan);
      filter: drop-shadow(0 0 16px rgba(0,229,255,0.5));
      display: flex;
      justify-content: center;
    }

    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 900;
      font-size: clamp(48px, 10vw, 80px);
      letter-spacing: -0.03em;
      line-height: 0.9;
      background: linear-gradient(135deg, var(--white), rgba(240,240,255,0.7));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 20px;
    }
    .tagline {
      font-size: 18px;
      font-weight: 300;
      color: rgba(240,240,255,0.55);
      line-height: 1.6;
      margin-bottom: 48px;
    }

    .coming-soon-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 32px;
    }
    .coming-soon-text span {
      color: var(--cyan);
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }

    .actions {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-decoration: none;
      transition: all 0.2s ease;
    }
    .btn-primary {
      background: var(--cyan);
      color: #000;
      box-shadow: 0 0 30px rgba(0,229,255,0.3);
    }
    .btn-primary:hover { box-shadow: 0 0 50px rgba(0,229,255,0.5); transform: translateY(-2px); }
    .btn-ghost {
      border: 1px solid var(--glass-border);
      background: var(--glass);
      backdrop-filter: blur(10px);
      color: var(--white);
    }
    .btn-ghost:hover { border-color: rgba(255,255,255,0.2); transform: translateY(-2px); }

    /* Scanline chart decoration */
    .chart-decoration {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 120px;
      pointer-events: none;
      opacity: 0.15;
    }
  </style>
</head>
<body>
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>

  <div class="card">
    <a href="../../" class="back-link">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <path d="M13 8H3M7 4L3 8L7 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      BACK TO BASE
    </a>

    <div style="display:flex; justify-content:center; margin-bottom: 24px;">
      <div class="badge">
        <div class="badge-dot"></div>
        FINTECH × AI INTELLIGENCE
      </div>
    </div>

    <div class="icon-wrap">
      <svg width="64" height="64" viewBox="0 0 48 48" fill="none">
        <circle cx="24" cy="24" r="22" stroke="currentColor" stroke-width="1.5"/>
        <path d="M12 30L17 20L22 25L27 15L33 20" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="33" cy="20" r="2.5" fill="currentColor"/>
        <path d="M12 36H36" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>

    <h1>TokenWatch</h1>
    <p class="tagline">
      Financial intelligence, reimagined.<br/>
      Cut through the noise. Watch the signal.
    </p>

    <p class="coming-soon-text">
      LAUNCHING SOON <span>_</span>
    </p>

    <div class="actions">
      <a href="mailto:hello@brilliantdisruptions.com?subject=TokenWatch%20Early%20Access" class="btn btn-primary">
        Get Early Access
      </a>
      <a href="../../" class="btn btn-ghost">
        Back to Home
      </a>
    </div>
  </div>

  <!-- Decorative chart SVG -->
  <svg class="chart-decoration" viewBox="0 0 1440 120" preserveAspectRatio="none">
    <polyline
      points="0,80 120,60 200,70 280,40 340,55 420,30 500,45 580,20 640,35 720,15 800,25 880,10 960,20 1040,5 1120,15 1200,8 1280,18 1360,5 1440,12"
      fill="none"
      stroke="#00e5ff"
      stroke-width="1.5"
    />
    <polyline
      points="0,90 120,75 200,85 280,60 340,72 420,50 500,65 580,40 640,55 720,38 800,48 880,30 960,40 1040,22 1120,35 1200,28 1280,38 1360,22 1440,30"
      fill="none"
      stroke="#7c3aed"
      stroke-width="1"
      opacity="0.6"
    />
  </svg>
</body>
</html>
